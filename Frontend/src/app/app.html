<div class="app">
  <header>
    <div class="brand">
      <svg class="mark" viewBox="0 0 34 28" aria-hidden="true">
        <rect x="1" y="18" width="3.4" height="8" fill="var(--bid)"></rect>
        <rect x="5.7" y="11" width="3.4" height="15" fill="var(--bid)"></rect>
        <rect x="10.4" y="3" width="3.4" height="23" fill="var(--bid)"></rect>
        <rect x="20.2" y="3" width="3.4" height="23" fill="var(--ask)"></rect>
        <rect x="24.9" y="11" width="3.4" height="15" fill="var(--ask)"></rect>
        <rect x="29.6" y="18" width="3.4" height="8" fill="var(--ask)"></rect>
        <path d="M16 2 L17 0 L18 2 L18 26 L16 26 Z" fill="var(--accent)"></path>
      </svg>
      <span class="word">
          <b>VALKYRIE</b>
          <span>EXCHANGE</span>
      </span>
    </div>


    <div class="tabs" role="tablist" aria-level="Instrument">
      @for (instrument of instruments(); track instrument.securityId) {
        <button class="tab"
                role="tab"
                [attr.aria-selected]="instrument.securityId==activeId()"
                (click)="select(instrument.securityId)"
        >
      <span class="tk">
        <span class="sym">{{ instrument.symbol }}</span>
        <span class="id">{{ instrument.securityId }}</span>
      </span>

          <span class="row2">
        <span class="px num">{{ instrument.last.toFixed(2) }}</span>
        <span class="chg num"
              [class.up]="instrument.changePercent >= 0"
              [class.down]="instrument.changePercent < 0"
        >
          {{ instrument.changePercent >= 0 ? '+' : '' }}{{ instrument.changePercent.toFixed(2) }}%
        </span>
      </span>
        </button>
      }
    </div>

    <div class="hstatus">
      <span class="chip live">
        <span class="sq"></span>
        <b>LIVE</b>
      </span>

      <button
        class="toggle"
        type="button"
        (click)="toggleTheme()"
        aria-label="Toggle Color Theme"
        title="Toggle theme"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">

          @if (dark()) {
            <circle cx="12" cy="12" r="4.2"></circle>
            <path
              d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"></path>
          } @else {
            <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"></path>
          }
        </svg>
      </button>
    </div>
  </header>

  <!-- depth ladder, order form working orders, trade tape-->
</div>
